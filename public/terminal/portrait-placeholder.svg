<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" role="img" aria-labelledby="portraitTitle">
  <title id="portraitTitle">Portrait placeholder</title>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#0f2417" />
      <stop offset="55%" stop-color="#081a10" />
      <stop offset="100%" stop-color="#050a07" />
    </radialGradient>
    <radialGradient id="bustGlow" cx="50%" cy="34%" r="55%">
      <stop offset="0%" stop-color="#7dff9b" stop-opacity="0.55" />
      <stop offset="60%" stop-color="#4fbf6c" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#4fbf6c" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="bustFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a8f57" />
      <stop offset="100%" stop-color="#173d26" />
    </linearGradient>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="transparent" />
      <rect width="4" height="1" fill="#000000" opacity="0.22" />
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="45%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55" />
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="320" height="400" fill="url(#bgGlow)" />

  <circle cx="160" cy="150" r="120" fill="url(#bustGlow)" />

  <g>
    <circle cx="160" cy="130" r="58" fill="url(#bustFill)" />
    <path
      d="M 62 400
         C 62 300 100 258 160 258
         C 220 258 258 300 258 400
         Z"
      fill="url(#bustFill)"
    />
  </g>

  <rect x="0" y="0" width="320" height="400" fill="url(#scanlines)" />
  <rect x="0" y="0" width="320" height="400" fill="url(#vignette)" />

  <rect x="1" y="1" width="318" height="398" fill="none" stroke="#4fbf6c" stroke-opacity="0.5" stroke-width="2" />
</svg>
